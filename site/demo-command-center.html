<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Command Center Demo — StaffingAgent.ai</title>
  <meta name="description" content="Live demo of the StaffingAgent Command Center — real-time pay/bill dashboard with risk alerts, TimeOps, RiskOps, and mass actions for staffing firms.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600;700&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css?v=20260404">
  <link rel="stylesheet" href="demos.css?v=20260404">
  <style>
    .gate-overlay {
      position: fixed; inset: 0; z-index: 300;
      background: linear-gradient(175deg, #0f172a 0%, #1e293b 100%);
      display: flex; align-items: center; justify-content: center;
      transition: opacity .4s ease;
    }
    .gate-overlay.hidden { opacity: 0; pointer-events: none; }
    .gate-card {
      background: #fff; border-radius: 20px; padding: 3rem;
      max-width: 460px; width: 90%; text-align: center;
      box-shadow: 0 24px 80px rgba(0,0,0,.3);
    }
    .gate-logo { font-weight: 800; font-size: 1.4rem; letter-spacing: -.02em; margin-bottom: .25rem; }
    .gate-logo span { color: var(--sa-accent); }
    .gate-subtitle { font-size: .85rem; color: #64748b; margin-bottom: 1.75rem; }
    .gate-field { margin-bottom: .85rem; text-align: left; }
    .gate-label { display: block; font-size: .75rem; font-weight: 600; color: #475569; margin-bottom: .35rem; letter-spacing: .03em; text-transform: uppercase; }
    .gate-input {
      width: 100%; padding: .8rem 1rem; font-family: inherit; font-size: .95rem;
      border: 2px solid #e2e8f0; border-radius: 10px;
      font-weight: 500; transition: border-color .2s; box-sizing: border-box;
    }
    .gate-input:focus { outline: none; border-color: var(--sa-accent); box-shadow: 0 0 0 3px rgba(6,182,212,.12); }
    .gate-input.error { border-color: #ef4444; }
    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      25% { transform: translateX(-6px); }
      75% { transform: translateX(6px); }
    }
    .gate-btn {
      width: 100%; margin-top: .5rem; padding: .9rem; font-family: inherit;
      font-size: 1rem; font-weight: 700; border: none; border-radius: 10px;
      background: var(--sa-accent); color: #fff; cursor: pointer; transition: all .2s;
      display: flex; align-items: center; justify-content: center; gap: .5rem;
    }
    .gate-btn:hover:not(:disabled) { background: var(--sa-accent-hover); transform: translateY(-1px); box-shadow: 0 4px 14px rgba(6,182,212,.35); }
    .gate-btn:disabled { opacity: .7; cursor: not-allowed; transform: none; }
    .gate-spinner { width: 16px; height: 16px; border: 2px solid rgba(255,255,255,.4); border-top-color: #fff; border-radius: 50%; animation: spin .7s linear infinite; display: none; }
    .gate-btn.loading .gate-spinner { display: block; }
    .gate-btn.loading .gate-btn-text { opacity: .8; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .gate-error { font-size: .8rem; color: #ef4444; margin-top: .75rem; display: none; }
    .gate-hint { font-size: .75rem; color: #94a3b8; margin-top: 1rem; }
    .gate-badge {
      display: inline-block; font-size: .65rem; font-weight: 700; padding: .3rem .9rem;
      border-radius: 20px; letter-spacing: .06em; text-transform: uppercase;
      background: rgba(6,182,212,.08); color: var(--sa-accent); margin-bottom: 1.25rem;
    }
    .demo-frame-wrap {
      position: fixed; top: 48px; left: 0; right: 0; bottom: 0;
      display: none;
    }
    .demo-frame-wrap.active { display: block; }
    .demo-frame-wrap iframe {
      width: 100%; height: 100%; border: none;
    }
    .demo-topbar {
      position: fixed; top: 0; left: 0; right: 0; height: 48px; z-index: 200;
      background: #0f172a; display: none; align-items: center; justify-content: space-between;
      padding: 0 1.5rem; border-bottom: 1px solid #1e293b;
    }
    .demo-topbar.active { display: flex; }
    .demo-topbar-logo { font-weight: 800; font-size: 1.1rem; color: #f1f5f9; letter-spacing: -.02em; }
    .demo-topbar-logo span { color: var(--sa-accent); }
    .demo-topbar-meta { display: flex; align-items: center; gap: 1.5rem; }
    .demo-topbar-badge {
      font-size: .65rem; font-weight: 700; padding: .25rem .75rem;
      border-radius: 20px; text-transform: uppercase; letter-spacing: .06em;
      background: rgba(234,179,8,.15); color: #facc15;
    }
    .demo-topbar-back {
      font-size: .82rem; font-weight: 600; color: #94a3b8;
      text-decoration: none; transition: color .2s;
    }
    .demo-topbar-back:hover { color: #f1f5f9; }
  </style>
</head>
<body>

<div class="gate-overlay" id="gate">
  <div class="gate-card">
    <div class="gate-badge">Self-Service Demo</div>
    <div class="gate-logo">Staffing<span>Agent</span>.ai</div>
    <p class="gate-subtitle">Enter your details to access the Command Center live demo.</p>
    <form id="gate-form" novalidate>
      <div class="gate-field">
        <label class="gate-label" for="gate-name">Your Name</label>
        <input type="text" class="gate-input" id="gate-name" placeholder="Jane Smith" autocomplete="name" required>
      </div>
      <div class="gate-field">
        <label class="gate-label" for="gate-email">Work Email</label>
        <input type="email" class="gate-input" id="gate-email" placeholder="jane@company.com" autocomplete="email" required>
      </div>
      <div class="gate-field">
        <label class="gate-label" for="gate-company">Company Name</label>
        <input type="text" class="gate-input" id="gate-company" placeholder="Acme Staffing" autocomplete="organization" required>
      </div>
      <button type="submit" class="gate-btn" id="gate-btn">
        <span class="gate-spinner"></span>
        <span class="gate-btn-text">View the Command Center &rarr;</span>
      </button>
      <p class="gate-error" id="gate-error">Something went wrong — please try again.</p>
    </form>
    <p class="gate-hint">We'll never share your info. You may hear from us about StaffingAgent.</p>
  </div>
</div>

<div class="demo-topbar" id="topbar">
  <div class="demo-topbar-logo">Staffing<span>Agent</span>.ai</div>
  <div class="demo-topbar-meta">
    <span class="demo-topbar-badge" id="topbar-badge">Demo Environment</span>
    <a href="demos.html" class="demo-topbar-back">&larr; All Demos</a>
  </div>
</div>

<div class="demo-frame-wrap" id="frame-wrap">
  <iframe id="dashboard-frame" title="StaffingAgent Command Center"></iframe>
</div>

<script>
(function() {
  var HS_PORTAL_ID = '245521589';
  var HS_FORM_GUID = '33eb4c23-f577-486b-bd43-806fe31ddf01';
  var HS_ENDPOINT = 'https://api.hsforms.com/submissions/v3/integration/submit/' + HS_PORTAL_ID + '/' + HS_FORM_GUID;
  var EMAIL_KEY = 'sa_demo_email';

  function getDestHash() {
    return window.location.hash || '';
  }

  function unlock() {
    document.getElementById('gate').classList.add('hidden');
    document.getElementById('topbar').classList.add('active');
    document.getElementById('frame-wrap').classList.add('active');
    document.getElementById('dashboard-frame').src = 'command-center/index.html' + getDestHash();
    setTimeout(function() { document.getElementById('gate').style.display = 'none'; }, 500);
  }

  // Pre-fill email for returning visitors (still must submit each time)
  var savedEmail = localStorage.getItem(EMAIL_KEY);
  if (savedEmail) {
    document.getElementById('gate-email').value = savedEmail;
  }

  document.getElementById('gate-form').addEventListener('submit', function(e) {
    e.preventDefault();

    var nameEl    = document.getElementById('gate-name');
    var emailEl   = document.getElementById('gate-email');
    var companyEl = document.getElementById('gate-company');
    var btn       = document.getElementById('gate-btn');
    var errorEl   = document.getElementById('gate-error');

    var name    = nameEl.value.trim();
    var email   = emailEl.value.trim();
    var company = companyEl.value.trim();

    // Basic validation
    [nameEl, emailEl, companyEl].forEach(function(el) { el.classList.remove('error'); });
    errorEl.style.display = 'none';

    var valid = true;
    if (!name)                          { nameEl.classList.add('error');    valid = false; }
    if (!email || !email.includes('@')) { emailEl.classList.add('error');   valid = false; }
    if (!company)                       { companyEl.classList.add('error'); valid = false; }
    if (!valid) return;

    // Loading state
    btn.disabled = true;
    btn.classList.add('loading');
    btn.querySelector('.gate-btn-text').textContent = 'Opening demo…';

    // Parse first/last name
    var nameParts = name.split(' ');
    var firstname = nameParts[0];
    var lastname  = nameParts.slice(1).join(' ') || '';

    var payload = {
      fields: [
        { name: 'firstname', value: firstname },
        { name: 'lastname',  value: lastname  },
        { name: 'email',     value: email     },
        { name: 'company',   value: company   }
      ],
      context: {
        pageUri:  window.location.href,
        pageName: 'Command Center Demo Access'
      }
    };

    fetch(HS_ENDPOINT, {
      method:  'POST',
      headers: { 'Content-Type': 'application/json' },
      body:    JSON.stringify(payload)
    })
    .then(function(res) {
      // HubSpot returns 200 on success; treat any 2xx as good
      if (res.ok) {
        localStorage.setItem(EMAIL_KEY, email);
        unlock();
      } else {
        return res.json().then(function(data) {
          throw new Error(data.message || 'Submission failed');
        });
      }
    })
    .catch(function(err) {
      console.warn('HubSpot submission error:', err);
      // Fail open — don't block the demo over a tracking error
      localStorage.setItem(EMAIL_KEY, email);
      unlock();
    });
  });
})();
</script>
<script type="text/javascript" id="hs-script-loader" async defer src="//js-na2.hs-scripts.com/245521589.js"></script>
<script src="/chat-widget.js" defer></script>
</body>
</html>
