services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: staffingagent
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: localdev
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 5

  localstack:
    image: localstack/localstack:latest
    environment:
      SERVICES: s3
      DEFAULT_REGION: us-east-1
    ports:
      - "4566:4566"
    volumes:
      - localstack_data:/var/lib/localstack

  api:
    build:
      context: ..
      dockerfile: platform/Dockerfile
    environment:
      DATABASE_URL: postgresql+asyncpg://app_user:changeme_in_production@db:5432/staffingagent
      DATABASE_ADMIN_URL: postgresql+asyncpg://postgres:localdev@db:5432/staffingagent
      AWS_ENDPOINT_URL: http://localstack:4566
      S3_BUCKET: staffingagent-uploads
      AWS_ACCESS_KEY_ID: test
      AWS_SECRET_ACCESS_KEY: test
      AWS_DEFAULT_REGION: us-east-1
      JWT_SECRET: local-dev-secret-change-in-production
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ..:/app

volumes:
  pgdata:
  localstack_data:
