name: Deploy Command Center

on:
  push:
    branches: [main]
    paths:
      - "command-center-app/**"
  workflow_dispatch:

concurrency:
  group: deploy-command-center
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: command-center-app/package-lock.json

      - name: Install dependencies
        working-directory: command-center-app
        run: npm ci

      - name: Type-check and build
        working-directory: command-center-app
        run: npm run build

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: us-east-1

      - name: Sync to S3
        run: |
          aws s3 sync command-center-app/dist/ s3://${{ secrets.FRONTEND_S3_BUCKET }}/app \
            --delete \
            --cache-control "public, max-age=31536000, immutable" \
            --exclude "index.html"
          aws s3 cp command-center-app/dist/index.html s3://${{ secrets.FRONTEND_S3_BUCKET }}/app/index.html \
            --cache-control "no-cache, no-store, must-revalidate"
