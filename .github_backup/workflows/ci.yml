name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,api]"

      - name: Lint
        run: ruff check src tests

      - name: Run tests
        run: pytest
        env:
          JWT_SECRET: "ci-test-secret-not-used-in-production-xxxxxxxxxxxxxxxx"
          DATABASE_URL: "postgresql+asyncpg://postgres:postgres@localhost/test"
          BULLHORN_CREDS_KEK: "AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA="
